# M0 platform skeleton — boots gateway + Kafka KRaft + Postgres pgvector + Redis.
# Service names are pinned by ADR (referenced inline). Host-exposed ports follow
# the 102xx data-store block + 18080 gateway + 19092 Kafka.

services:
  # --- ADR-05: Postgres 16 + pgvector ---
  postgres-playground:
    image: pgvector/pgvector:pg16
    container_name: playground-postgres
    hostname: playground-postgres
    environment:
      POSTGRES_DB: playground
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playground}
    ports:
      - "10232:5432"
    volumes:
      - postgres-playground-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playground} -d playground"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- ADR-07 / ADR-08 amendment: Redis (gateway sessions + docs ingestion locks) ---
  # Namespace allocation (ADR-08 §A08.4): `spring:session:*` (gateway sessions)
  # and `docs:lock:*` (docs-ingestion distributed locks — renamed from
  # `rag-ingestion:lock:*` in M6.1 per BC consolidation).
  redis-playground:
    image: redis:7-alpine
    container_name: playground-redis
    hostname: playground-redis
    ports:
      - "10279:6379"
    volumes:
      - redis-playground-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- ADR-03: Kafka KRaft mode (no Zookeeper) ---
  kafka-playground:
    image: apache/kafka:3.8.0
    container_name: playground-kafka-broker
    hostname: playground-kafka-broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-playground:9092,EXTERNAL://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-playground:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    ports:
      - "19092:19092"
    volumes:
      - kafka-playground-data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-playground:9092 || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10

  # --- ADR-01 v2 / ADR-07: Gateway (single ingress, host-exposed) ---
  gateway:
    build:
      context: ../backend/springboot
      dockerfile: gateway/Dockerfile
    image: playground/backend-gateway:dev
    container_name: playground-backend-gateway
    hostname: playground-backend-gateway
    depends_on:
      postgres-playground:
        condition: service_healthy
      redis-playground:
        condition: service_healthy
      kafka-playground:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Explicit heap cap so `jvm_memory_max_bytes` reports a positive value
      # (the JVM in a container without -Xmx and without a cgroup memory
      # limit returns -1 for max, which displays as garbage on the M5
      # dashboard). 512 MB suits personal-scale workload; operators may
      # tune via the JAVA_TOOL_OPTIONS env var without rebuilding.
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx512m}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPARK_INFERENCE_GATEWAY_URL: ${SPARK_INFERENCE_GATEWAY_URL:-http://host.docker.internal:10080}
      # M1: Google OAuth client + public base URL (per ADR-07 + ADR-10)
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      PLAYGROUND_PUBLIC_BASE_URL: ${PLAYGROUND_PUBLIC_BASE_URL:-https://playground.jeeklee.com}
      # M1: gateway → identity-api bootstrap + Redis cache (per ADR-10 §4)
      IDENTITY_BASE_URL: ${IDENTITY_BASE_URL:-http://identity-api:18081}
      # M2: gateway → docs-api routing target for /api/docs/** (per ADR-12 §15)
      DOCS_BASE_URL: ${DOCS_BASE_URL:-http://docs-api:18082}
      REDIS_HOST: ${REDIS_HOST:-redis-playground}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PLAYGROUND_COOKIES_SECURE: ${PLAYGROUND_COOKIES_SECURE:-true}
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- M1: identity-api (Identity BC quadruplet runnable per ADR-01 v2) ---
  # No host port — gateway is the only host-exposed ingress (ADR-08).
  identity-api:
    build:
      context: ../backend/springboot
      dockerfile: identity/identity-api/Dockerfile
    image: playground/backend-identity-api:dev
    container_name: playground-backend-identity-api
    hostname: playground-backend-identity-api
    depends_on:
      postgres-playground:
        condition: service_healthy
      kafka-playground:
        condition: service_healthy
      redis-playground:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Explicit heap cap so `jvm_memory_max_bytes` reports a positive value
      # (the JVM in a container without -Xmx and without a cgroup memory
      # limit returns -1 for max, which displays as garbage on the M5
      # dashboard). 512 MB suits personal-scale workload; operators may
      # tune via the JAVA_TOOL_OPTIONS env var without rebuilding.
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx512m}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres-playground}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playground}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka-playground:9092}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- ADR-05 amendment + ADR-12 §5/§6: OpenSearch (search projection for docs BC) ---
  # The `docs-v1` index is created by docs-api at boot (search projector ensures
  # mappings + Nori-based Korean analyzer; ADR-12 §6). The `analysis-nori` plugin
  # ships built-in with the 2.x image — no extra install step. Security plugin is
  # disabled for dev (single-node, compose-internal); re-enable for any public
  # deployment via a future per-milestone ADR.
  opensearch-playground:
    build:
      context: ./opensearch
      dockerfile: Dockerfile
    image: playground/opensearch:2.18.0-nori
    container_name: playground-opensearch
    hostname: playground-opensearch
    environment:
      cluster.name: opensearch-playground
      node.name: opensearch-playground
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "10292:9200"
    volumes:
      - opensearch-playground-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  # --- ADR-05 §A05.2 + ADR-12 §A12.4: MinIO sidecar (docs BC originals) ---
  # M6.1 activates the "object storage — reserved slot" that ADR-05's 2026-05-17
  # amendment penciled in for M2.1 — pinned to MinIO and host-exposed at
  # 10294/10295 in the 102xx data-store block. The single bucket
  # `playground-docs-originals` is created by docs-api at startup via the MinIO
  # Java SDK's bucketExists + makeBucket (in-process bootstrap; no sidecar init
  # container). Compose-internal only for the S3 API consumers — `10294` is
  # host-exposed for operator tooling (mc, awscli) and `10295` for the console.
  minio-playground:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio-playground
    hostname: minio-playground
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playground}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playground-secret}
    command: server /data --console-address ":9001"
    ports:
      - "10294:9000"   # S3 API (host-exposed for operator tooling; same 102xx block as postgres/redis/opensearch)
      - "10295:9001"   # MinIO console
    volumes:
      - minio-playground-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- ADR-03: one-shot Kafka topic provisioning ---
  # Ensures the M1 (identity.user.*) and M2 (docs.document.*) business topics
  # exist with the ADR-03 default settings (partitions=3, replication=1,
  # retention=7d). Auto-create is still enabled on the broker for safety, but
  # auto-created topics use the broker's `num.partitions=1` default — running
  # this init container at compose-up time pins the partition count. The
  # service exits 0 on success; recreate it with `docker compose up kafka-init`
  # if a new topic is added.
  kafka-init:
    image: apache/kafka:3.8.0
    container_name: playground-kafka-init
    hostname: playground-kafka-init
    depends_on:
      kafka-playground:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka-playground:9092}
    entrypoint: ["/bin/sh", "/etc/kafka-init/init-topics.sh"]
    volumes:
      - ./kafka/init-topics.sh:/etc/kafka-init/init-topics.sh:ro
    restart: "no"

  # --- M2 S1/S2: docs-api (Docs BC quadruplet runnable per ADR-01 v2 + ADR-12 §15) ---
  # No host port — gateway is the only host-exposed ingress (ADR-08).
  # S2 adds: OpenSearch projector wiring (OPENSEARCH_BASE_URL), owner-resolution
  # webclient against identity-api (IDENTITY_BASE_URL), and the configured owner
  # google-sub (PLAYGROUND_OWNER_GOOGLE_SUB) for the public feed (ADR-12 §8).
  docs-api:
    build:
      context: ../backend/springboot
      dockerfile: docs/docs-api/Dockerfile
    image: playground/backend-docs-api:dev
    container_name: playground-backend-docs-api
    hostname: playground-backend-docs-api
    depends_on:
      postgres-playground:
        condition: service_healthy
      kafka-playground:
        condition: service_healthy
      redis-playground:
        condition: service_healthy
      opensearch-playground:
        condition: service_healthy
      minio-playground:
        condition: service_healthy   # M6.1: bucket bootstrap must not race the sidecar
      identity-api:
        condition: service_healthy   # boot-time owner resolution per ADR-12 §8
    networks:
      # M6 ADR-16 — docs-api uses Spring AI Vision for PDF OCR fallback and
      # M6.1 ADR-12 §A12.1 absorbs rag-ingestion's BGE-M3 embedding calls, so
      # it must reach `spark-inference-gateway:8000` by container DNS for both
      # paths. Joined to two bridges (default + spark-inference-net), same
      # pattern as chat-api / metrics-api (ADR-04 amendment 2026-05-20).
      # Without this attach, docs-api gets "Temporary failure in name
      # resolution" on every OCR / embedding call.
      - default
      - spark-inference-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Explicit heap cap so `jvm_memory_max_bytes` reports a positive value
      # (the JVM in a container without -Xmx and without a cgroup memory
      # limit returns -1 for max, which displays as garbage on the M5
      # dashboard).
      #
      # M6.1 ADR-12 §A12.11 — docs-api absorbs rag-ingestion + serves the
      # async extraction worker. Initial M6.1 pin of 1024 MB OOM'd on the
      # first scan-heavy architectural PDF (2026-05-22 incident): PDFBox's
      # DCTFilter decoded embedded 300-600 DPI JPEGs to native-resolution
      # ByteInterleavedRasters during a single page render, which alone
      # exceeded the headroom. The render-side fix (subsamplingAllowed +
      # in-flight semaphore) cuts the steady-state working set back to
      # ~50 MB per concurrent page, but the per-image decode peak is still
      # ~hundreds of MB for image-rich PDFs. 2048 MB is the new default,
      # tunable via JAVA_TOOL_OPTIONS without rebuilding.
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx2048m}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres-playground}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playground}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka-playground:9092}
      REDIS_HOST: ${REDIS_HOST:-redis-playground}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # M2 S2 (ADR-12 §5 + §8)
      OPENSEARCH_BASE_URL: ${OPENSEARCH_BASE_URL:-http://opensearch-playground:9200}
      IDENTITY_BASE_URL: ${IDENTITY_BASE_URL:-http://identity-api:18081}
      PLAYGROUND_OWNER_GOOGLE_SUB: ${PLAYGROUND_OWNER_GOOGLE_SUB:-}
      # M6 ADR-16 + M6.1 ADR-12 §A12.1 — Spring AI Vision OCR + BGE-M3 embed.
      # docs-api joins the spark-inference-net bridge (declared above) AND
      # needs the same SPRING_AI_OPENAI_* envs the other consumer BCs
      # (chat-api / metrics-api) carry. Without these the OpenAI-
      # compatible client falls through to application.yml defaults
      # (base-url = host.docker.internal:10080, api-key = dummy-not-used),
      # giving HTTP 401 'invalid master key' from spark-inference-gateway.
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-http://spark-inference-gateway:8000}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-dummy-not-used}
      SPRING_AI_VISION_MODEL: ${SPRING_AI_VISION_MODEL:-qwen3-vl-30b-a3b}
      # M6.1 ADR-12 §A12.4 — MinIO source-blob storage. The sidecar service
      # itself is added in the infra commit; here we wire only the env vars
      # the docs-api process reads via application.yml's @Value bindings.
      PLAYGROUND_DOCS_MINIO_ENDPOINT: ${PLAYGROUND_DOCS_MINIO_ENDPOINT:-http://minio-playground:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playground}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playground-secret}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- M3 rag-ingestion-api: RETIRED in M6.1 (ADR-12 §A12.1 + ADR-01 §A01.1) ---
  # The RAG-Ingestion BC was absorbed into docs-api on 2026-05-22. The chunker,
  # embedder, pgvector adapter, distributed lock, and three Kafka listeners all
  # moved to `docs-*` modules; port 18083 returned to the reservation pool.
  # The Java modules `rag-ingestion-{domain,app,infra,api}` are removed in the
  # same M6.1 cycle (commit 1). Historical reference: `docs/adr/13-m3-rag-ingestion.md`.

  # --- M4: chat-api (Chat BC quadruplet runnable per ADR-01 v2 + ADR-14) ---
  # No host port — gateway routes /api/chat/** here per ADR-07 + ADR-14 §2.
  # No Kafka dependency — chat publishes/consumes no events (ADR-14 §1 + §A).
  # Cross-schema SELECT into `docs.document_chunks`, `docs.documents`, and
  # `identity.users` runs via JDBC against postgres-playground (ADR-14 §3 + §G.3,
  # post-M6.1 the chunks table moved to the `docs` schema per ADR-12 §A12.1);
  # docs-api is NOT a depends_on target (no HTTP coupling).
  # Reaches spark-inference-gateway (Qwen3-32B chat + BGE-M3 query embeddings)
  # via host.docker.internal:10080 per ADR-04 + ADR-14 §B.
  chat-api:
    build:
      context: ../backend/springboot
      dockerfile: chat/chat-api/Dockerfile
    image: playground/backend-chat-api:dev
    container_name: playground-backend-chat-api
    hostname: playground-backend-chat-api
    depends_on:
      postgres-playground:
        condition: service_healthy
      redis-playground:
        condition: service_healthy
      minio-playground:
        condition: service_healthy     # ADR-20: chat attachment blob store
      gateway:
        condition: service_started     # gateway must be up for /api/chat/** routing
    networks:
      # Joined to two bridges (see docs-api block + ADR-04 amendment
      # 2026-05-20): playground default for db/cache/gateway hops, external
      # `spark-inference-net` for direct DNS to `spark-inference-gateway`.
      - default
      - spark-inference-net
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ADR-04 fallback path (host-process gateway)
    environment:
      # Explicit heap cap so `jvm_memory_max_bytes` reports a positive value
      # (the JVM in a container without -Xmx and without a cgroup memory
      # limit returns -1 for max, which displays as garbage on the M5
      # dashboard). 512 MB suits personal-scale workload; operators may
      # tune via the JAVA_TOOL_OPTIONS env var without rebuilding.
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx512m}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres-playground}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playground}
      REDIS_HOST: ${REDIS_HOST:-redis-playground}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # spark-inference-gateway via the OpenAI-compatible vLLM endpoint (ADR-04 + ADR-14 §B).
      # Same defaults as docs-api (post-M6.1 absorbed rag-ingestion's embed path)
      # and metrics-api — shared spark-inference-gateway endpoint.
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-http://host.docker.internal:10080}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-dummy-not-used}
      # ADR-20: MinIO blob store for chat message attachments (tool artifacts,
      # e.g. the .3dm). Mirrors docs-api's MinIO wiring (ADR-12 §A12.4); same
      # minio-playground on playground-net. Bucket is made-if-absent at startup.
      PLAYGROUND_CHAT_MINIO_ENDPOINT: ${PLAYGROUND_CHAT_MINIO_ENDPOINT:-http://minio-playground:9000}
      PLAYGROUND_CHAT_MINIO_BUCKET: ${PLAYGROUND_CHAT_MINIO_BUCKET:-chat-attachments}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playground}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playground-secret}
      # Retrieval K (ADR-14 §7) — overridable for experiments without recompile.
      PLAYGROUND_CHAT_RETRIEVAL_K: ${PLAYGROUND_CHAT_RETRIEVAL_K:-6}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18084/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    # NO `ports:` block — chat-api is compose-internal only (ADR-08).
    # Browser traffic reaches it via gateway:18080 → /api/chat/** → http://chat-api:18084.

  # --- agent-tools: Python multi-BC host (ADR-19 §D1) — first BC: architecture ---
  # Single FastAPI host for small LLM-tool BCs (ADR-19 supersedes ADR-18's
  # single-service `massing-gen` framing). First BC is `architecture`
  # (tool: generate_massing); rhino3dm.py is imported in-process (no
  # sidecar). Reaches docs-api over compose-internal HTTP (Exception 5)
  # for brief body reads, spark-inference-gateway via `spark-inference-net`
  # for the LLM extraction call. Owner-only `.3dm` download mounted at the
  # gateway's /api/arch/** route per ADR-18 §21 (StripPrefix=2 → /outputs/{id}).
  # Phase 1 (rename only) keeps the cohesive `app` package; the host/BC
  # package split (agent-tools/app + agent-tools/architecture) is Phase 2.
  agent-tools:
    build:
      context: ../backend/fastapi/agent-tools
      dockerfile: Dockerfile
    image: playground/agent-tools:dev
    container_name: agent-tools
    hostname: agent-tools
    depends_on:
      minio-playground:
        condition: service_healthy   # ADR-20 §D3 revised: agent-tools owns MinIO write
      gateway:
        condition: service_started
    networks:
      - default
      - spark-inference-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCS_API_BASE_URL: ${DOCS_API_BASE_URL:-http://docs-api:18082}
      # spark-inference-gateway — shared with the other LLM-touching BCs.
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-http://host.docker.internal:10080}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-dummy-not-used}
      PLAYGROUND_MASSING_GEN_LLM_MODEL: ${PLAYGROUND_MASSING_GEN_LLM_MODEL:-qwen3-vl-30b-a3b}
      PLAYGROUND_MASSING_GEN_MAX_FLOORS: ${PLAYGROUND_MASSING_GEN_MAX_FLOORS:-10}
      # ADR-20 §D3 revised — agent-tools owns MinIO write; same bucket as chat
      # so chat's download adapter can GET using the returned storageKey.
      PLAYGROUND_ARCHITECTURE_MINIO_ENDPOINT: ${PLAYGROUND_ARCHITECTURE_MINIO_ENDPOINT:-http://minio-playground:9000}
      PLAYGROUND_ARCHITECTURE_MINIO_BUCKET: ${PLAYGROUND_ARCHITECTURE_MINIO_BUCKET:-chat-attachments}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playground}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playground-secret}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    # NO `ports:` block — compose-internal only. chat-api reaches
    # `/internal/tools/generate-massing` directly via the hostname;
    # browser traffic for /api/arch/outputs/{id} hops through the gateway.

  # --- M5 s1: metrics-api (read-only BC over Prometheus + Loki) per ADR-15 §1 ---
  # WebFlux app on port 18085, gateway-routable. No Postgres / no Kafka.
  # Probes spark-inference-gateway via host.docker.internal (ADR-04).
  metrics-api:
    build:
      context: ../backend/springboot
      dockerfile: metrics/metrics-api/Dockerfile
    image: playground/backend-metrics-api:dev
    container_name: playground-backend-metrics-api
    hostname: playground-backend-metrics-api
    depends_on:
      prometheus-playground:
        condition: service_healthy
      loki-playground:
        condition: service_healthy
      redis-playground:
        condition: service_healthy     # reserved for slice-2 rate limiter
      gateway:
        condition: service_started     # gateway must be up for /api/metrics/** routing
    networks:
      # Joined to two bridges (see ADR-04 amendment 2026-05-20): playground
      # default for prometheus/loki/redis/gateway, external `spark-inference-net`
      # so the §17 health-grid spark cell can probe `spark-inference-gateway` by
      # name without bouncing through host.docker.internal.
      - default
      - spark-inference-net
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ADR-04 fallback path (host-process gateway)
    environment:
      # Explicit heap cap so `jvm_memory_max_bytes` reports a positive value
      # (the JVM in a container without -Xmx and without a cgroup memory
      # limit returns -1 for max, which displays as garbage on the M5
      # dashboard). 512 MB suits personal-scale workload; operators may
      # tune via the JAVA_TOOL_OPTIONS env var without rebuilding.
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx512m}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      METRICS_PROMETHEUS_BASE_URL: http://prometheus-playground:9090
      METRICS_LOKI_BASE_URL: http://loki-playground:3100
      # Spark probe wiring — reuses the operator's `.env` SPARK_INFERENCE_GATEWAY_URL
      # so the metrics health-grid sees the same endpoint docs-api / chat
      # call (ADR-15 §12 amendment 2026-05-20; post-M6.1 the embed path moved
      # from rag-ingestion to docs-api per ADR-12 §A12.1). Falls back to the
      # original host-process URL if `SPARK_INFERENCE_GATEWAY_URL` is not in `.env`.
      METRICS_SPARK_GATEWAY_BASE_URL: ${SPARK_INFERENCE_GATEWAY_URL:-http://host.docker.internal:10080}
      # Bearer token forwarded on every probe — same key docs-api / chat
      # use, so a single `.env` change covers all three BCs. Blank → no header,
      # which is fine for the bare-vLLM fallback that doesn't validate keys.
      METRICS_SPARK_GATEWAY_API_KEY: ${METRICS_SPARK_GATEWAY_API_KEY:-${SPRING_AI_OPENAI_API_KEY:-}}
      REDIS_HOST: ${REDIS_HOST:-redis-playground}
      REDIS_PORT: ${REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18085/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    # NO `ports:` block — metrics-api is compose-internal only (ADR-08 / ADR-15 §A).
    # Browser traffic reaches it via gateway:18080 → /api/metrics/** → http://metrics-api:18085.

  # --- M1: frontend (Next.js SSR) per ADR-06 + ADR-07 forwarding map ---
  # No host port — gateway routes `/**` here.
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: playground/frontend:dev
    container_name: playground-frontend
    hostname: playground-frontend
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # SSR fetches against the gateway (compose-internal hostname per ADR-07)
      GATEWAY_INTERNAL_URL: ${GATEWAY_INTERNAL_URL:-http://gateway:18080}
    healthcheck:
      # 127.0.0.1, not localhost — busybox wget resolves localhost to ::1
      # first and next-server binds IPv4 only, so the probe false-negatives.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- M5 s1: cadvisor-playground (per-container CPU/mem/IO/network metrics) ---
  # Pinned by ADR-15 §6 + §A. Read-only docker.sock + read-only host mounts.
  # NO host port — accessed by Alloy via compose-internal name only.
  cadvisor-playground:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: playground-cadvisor
    hostname: playground-cadvisor
    # cgroup v2 + systemd cgroup driver 환경 대응 — root cgroup만 보이던 문제 fix.
    # `--store_container_labels=false` 제거: cAdvisor가 자동 emit하는 `name` 라벨까지
    # stripped됐었음 (whitelist는 docker labels만 영향이라 가정했으나 실측상 name도
    # 비워짐). 카테고리 prefix 기반 PromQL 매칭은 이 라벨에 의존.
    command:
      - --docker_only=true
      - --whitelisted_container_labels=service
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # read-only docker socket (ADR-15 §6 + §20)
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro  # cgroup v2 hierarchy noexpose without explicit mount
      - /var/lib/docker:/var/lib/docker:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    # NO `ports:` — compose-internal only (ADR-15 §6).

  # --- M5 s1: prometheus-playground (TSDB + remote-write receiver) ---
  # Pinned by ADR-15 §3 + §A. Minimal scrape config — Alloy is the orchestrator
  # and pushes everything else via remote_write (--web.enable-remote-write-receiver).
  # Retention overridable via METRICS_PROM_RETENTION_DAYS (ADR-15 §18).
  # Host bind is OFF by default; operator may set PROMETHEUS_HOST_BIND=9090 (or
  # `127.0.0.1:9090`) to enable ad-hoc PromQL CLI access (ADR-15 §3 / spec §4.4).
  prometheus-playground:
    image: prom/prometheus:v2.54.1
    container_name: playground-prometheus
    hostname: playground-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${METRICS_PROM_RETENTION_DAYS:-7}d
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-playground-data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_BIND:-}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- M5 s1: loki-playground (log TSDB, push receiver only) ---
  # Pinned by ADR-15 §4 + §A. Single-binary `--target=all` (image default).
  # tsdb schema head from day one; retention 72h (3d). Push receiver open to
  # compose-internal traffic only (Alloy is the sole producer).
  # NO host port — accessed by metrics-api via compose-internal name only.
  loki-playground:
    image: grafana/loki:3.2.1
    container_name: playground-loki
    hostname: playground-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-playground-data:/loki
    environment:
      METRICS_LOKI_RETENTION_DAYS: ${METRICS_LOKI_RETENTION_DAYS:-3}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    # NO `ports:` — compose-internal only (ADR-15 §4).

  # --- M5 s1: alloy-playground (unified collector — scrape orchestrator + log shipper) ---
  # Pinned by ADR-15 §5 + §A. Replaces Promtail + node_exporter; single-file
  # River config at /etc/alloy/config.alloy. Mounts docker.sock read-only for
  # discovery.docker + loki.source.docker. State volume persists log cursors.
  # Depends on prometheus + loki being healthy (remote_write / loki.write
  # endpoints must be reachable at startup or Alloy back-offs spam logs).
  alloy-playground:
    image: grafana/alloy:v1.3.1
    container_name: playground-alloy
    hostname: playground-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # read-only docker socket (ADR-15 §5 + §20)
      - alloy-playground-data:/var/lib/alloy/data
    depends_on:
      prometheus-playground:
        condition: service_healthy
      loki-playground:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:12345/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    # NO `ports:` — compose-internal only (ADR-15 §5).

volumes:
  postgres-playground-data:
  redis-playground-data:
  kafka-playground-data:
  opensearch-playground-data:
  minio-playground-data:
  prometheus-playground-data:
  loki-playground-data:
  alloy-playground-data:

networks:
  # Playground compose's default bridge — declared explicitly because once any
  # service has a `networks:` block, compose stops auto-attaching the default.
  # `name:` pins the docker network name to `playground-net` regardless of the
  # compose project name (otherwise docker prefixes it as `<project>_default`).
  default:
    name: playground-net
  # The Spark inference stack (`spark-inference-gateway` + per-model backends
  # like `spark-inference-qwen3-vl-30b-a3b`, `spark-inference-bge-m3`) lives in a
  # SEPARATE compose project on a bridge named `spark-inference-net`. Three
  # playground services (`docs-api`, `chat-api`, `metrics-api`) join this
  # bridge so the gateway's container DNS resolves directly. (Pre-M6.1 the
  # third member was `rag-ingestion-api`; that BC was absorbed into docs-api
  # in M6.1, which now carries both the Vision OCR and the BGE-M3 embedding
  # calls — see ADR-12 §A12.1.) See ADR-04 amendment 2026-05-20.
  #
  # Operator prerequisite: the spark-stack compose project must be up first so
  # the network already exists; otherwise `docker compose up` here errors with
  # "network spark-inference-net declared as external, but could not be found."
  spark-inference-net:
    external: true
