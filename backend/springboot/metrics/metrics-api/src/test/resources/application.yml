# Test-side overrides for metrics-api @SpringBootTest contexts.
#
# Excludes RedissonAutoConfigurationV2 so the test bootstrap does NOT try to
# resolve `playground-redis:6379` (DNS-fails outside the compose stack). The
# real `RedissonIpRateLimiterAdapter` is `@ConditionalOnBean(RedissonClient.class)`,
# so without the auto-config the no-op `IpRateLimitPort` fallback applies and
# the dashboard route's rate-limit branch is exercised by injecting a test
# stub in the per-test `@TestConfiguration` blocks instead.
#
# We also exclude `RedisAutoConfiguration` to keep `spring.data.redis.*` from
# pulling Lettuce / Jedis into the context — Redisson is the only Redis
# client we want here in prod, but we don't want either client in tests.
spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
