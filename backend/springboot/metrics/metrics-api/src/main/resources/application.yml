server:
  # ADR-15 §1 — gateway-routable port 18085. No host port mapping in compose
  # per ADR-08 / ADR-15 §A; browser traffic flows through gateway:18080.
  port: ${METRICS_API_PORT:18085}
  forward-headers-strategy: framework

spring:
  application:
    name: metrics-api
  main:
    web-application-type: reactive
  # ADR-15 §E — metrics BC has no Postgres / JPA. Belt-and-suspenders exclusions
  # so a stray transitive dep doesn't trigger DataSource autoconfig (Spring
  # Boot's well-known footgun where missing JDBC URL → embedded H2).
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    # ADR-15 §C + §18 — Redisson Spring Boot starter reads these to wire its
    # RedissonClient bean. Bucket keys (metrics:bucket:ip:*:dashboard) are
    # namespaced inside the RedissonIpRateLimiterAdapter.
    redis:
      host: ${REDIS_HOST:redis-playground}
      port: ${REDIS_PORT:6379}

# ADR-15 §7 + §18 — upstream URLs + per-adapter timeouts.
playground:
  metrics:
    prometheus:
      base-url: ${METRICS_PROMETHEUS_BASE_URL:http://prometheus-playground:9090}
      timeout-ms: 8000
    loki:
      base-url: ${METRICS_LOKI_BASE_URL:http://loki-playground:3100}
      timeout-ms: 15000
    spark-gateway:
      base-url: ${METRICS_SPARK_GATEWAY_BASE_URL:http://host.docker.internal:10080}
      probe-cache-ttl-seconds: 15
      # Bearer token for the post-2026-05-20 spark-inference-gateway (ADR-15
      # §12 amendment). Falls through METRICS_SPARK_GATEWAY_API_KEY (metrics-
      # specific override) → SPRING_AI_OPENAI_API_KEY (shared with chat /
      # rag-ingestion) → empty (the original bare-vLLM ADR-04 wiring that
      # did not validate keys).
      api-key: ${METRICS_SPARK_GATEWAY_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
    # ADR-15 §C + §18 — per-IP token bucket on /api/metrics/dashboard. 30
    # req/min/IP is enough for a single page polling at 15s cadence (≈4 req/min)
    # with headroom for a developer with multiple tabs.
    rate-limit:
      dashboard-per-min: ${METRICS_DASHBOARD_RATE_LIMIT_PER_MIN:30}
      # M5.1 — per-user logs bucket (currently no-op pass-through; the port
      # adapter ships when the logs UI lands).
      logs-per-min: ${METRICS_LOGS_RATE_LIMIT_PER_MIN:60}
    # ADR-15 §2 + §16 + spec §8.2 — per-PromQL-query timeout. Above this each
    # widget falls back to a "degraded": true sentinel cell.
    promql-budget-seconds: ${METRICS_PROMQL_BUDGET_S:10}
    # ADR-15 §18 — backend echoes the polling cadence to the frontend.
    poll-interval-seconds: ${METRICS_POLL_INTERVAL_S:15}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: metrics

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui

logging:
  level:
    com.playground.metrics: INFO
