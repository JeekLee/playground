server:
  port: 18082
  # ADR-07 §"Hosting model" + ADR-10 §9 — Cloudflare Tunnel terminates TLS so
  # Spring must honor X-Forwarded-* from upstream (the gateway forwards them).
  forward-headers-strategy: framework

spring:
  application:
    name: docs-api
  data:
    # M2 S3 (ADR-12 §10): Redis-backed view-dedup keys. Same Redis instance the
    # gateway uses for Spring Session (M1) — co-tenanted on a single host-local
    # container per ADR-05. No namespace clash because the view-claim keys are
    # prefixed `view:` while gateway session keys live under `spring:session:`.
    redis:
      host: ${REDIS_HOST:redis-playground}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      # M6 ADR-16 — multipart cap raised to 25 MB so the PDF upload path can
      # accept reasonable-size PDFs (the 200-page limit + 30 OCR-page limit
      # in PdfExtractorAdapter is the real correctness bound). 1 MB was the
      # M2 limit pinned to DocumentBody.MAX_OCTET_LENGTH (Markdown-only world);
      # M6 widens both the body VO (10 MB) and the multipart cap (25 MB raw
      # PDF). max-request-size adds 1 MB slack for the multipart envelope +
      # optional title/path form parts.
      max-file-size: 25MB
      max-request-size: 26MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres-playground}:${POSTGRES_PORT:5432}/${POSTGRES_DB:playground}?currentSchema=docs
    username: ${POSTGRES_USER:playground}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: docs
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: docs
    default-schema: docs
    table: flyway_history
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-playground:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        linger.ms: 10
        compression.type: lz4
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # The DocsSearchProjector @KafkaListener overrides group-id =
      # docs-search-projector; the (M6.1-absorbed) DocumentEventListener
      # overrides group-id = rag-ingestion. This default value exists so
      # the auto-configured ConsumerFactory bean (used by Spring Boot's
      # auto-config) is not headless at startup.
      group-id: docs-search-projector
      auto-offset-reset: earliest
  modulith:
    events:
      # M2 S2: Spring Modulith JPA outbox + Kafka bridge enabled. Domain events
      # (DocumentUploaded, DocumentVisibilityChanged, DocumentDeleted) publish
      # transactionally with the documents row per ADR-12 §1; the externalizer
      # mapping in docs-infra wraps them in the shared-kernel EventEnvelope and
      # routes them to the three Kafka topics defined in spec §5.
      #
      # M6.1 (ADR-08 §A08.6) — the retired rag.document.ingested topic no
      # longer has an externalization rule; ApplicationEventPublisher calls
      # on DocumentIngested simply do not externalize. The three
      # docs.document.* topics are now in-BC (docs producer + docs
      # consumer) per ADR-08 §A08.6 — Kafka stays in the path for DLQ +
      # cross-thread-pool decoupling.
      jdbc:
        schema-initialization:
          enabled: true
      externalization:
        enabled: true
      kafka:
        enabled: true
  ai:
    # M6 ADR-16 — Spring AI 1.0 GA wired against spark-inference-gateway for
    # the Vision OCR fallback (PDF pages with no text layer). Same starter
    # and base URL the chat (M4, was rag-chat) + rag-ingestion (M3) services use per
    # ADR-04; the only docs-BC-specific knob is the Vision model name.
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:http://spark-inference-gateway:8000}
      api-key: ${SPRING_AI_OPENAI_API_KEY:dummy-not-used}
      chat:
        options:
          # M6 ADR-16 — multimodal Vision model. Default
          # qwen3-vl-30b-a3b (loaded on the same spark-inference-gateway as
          # the chat models); override via env when a different model is
          # available without a docs-api rebuild.
          model: ${SPRING_AI_VISION_MODEL:qwen3-vl-30b-a3b}
          temperature: 0.1
          # ADR-16 §amendment 2026-05-21 — bench against the real KFI brief
          # PDF (55 pages, 3 OCR pages) showed Vision-LLM hallucinates
          # repeating text ("같은 도로명 무한 반복") on image-heavy pages
          # (maps, diagrams) and consumes max-tokens. Two safeguards:
          #   - max-tokens cap (1200) — a normal page markdown is ~800-1100
          #     tokens; 1200 leaves slack for dense pages but caps blowups.
          #   - frequency-penalty (0.5) — depresses repeated-token logits so
          #     the "도로명 도로명 도로명…" pattern doesn't escape. 0.5 is the
          #     conservative middle of OpenAI's [-2.0, 2.0] range; doesn't
          #     measurably affect normal-page markdown quality.
          # The 30-s per-page timeout (ADR-16) still acts as the final
          # safety net — these knobs just push the bad path off the worst
          # cliff. ADR-16 amendment captures the empirical rationale.
          max-tokens: 1200
          frequency-penalty: 0.5
      # M6.1 (ADR-12 §A12.1) — absorbed from rag-ingestion-api. The embedding
      # model name the spark-inference-gateway exposes for BGE-M3 — used by
      # SparkInferenceEmbeddingAdapter (in docs-infra) for chunk embedding.
      embedding:
        options:
          model: ${SPRING_AI_EMBEDDING_MODEL:bge-m3}
    retry:
      # M6.1 (ADR-12 §A12.1) — absorbed from rag-ingestion-api. The embedding
      # retry curve per ADR-13 §2 — applies to both the Vision chat call and
      # the embedding call via Spring AI's retry advisor.
      max-attempts: 3
      backoff:
        initial-interval: 400ms
        multiplier: 4.0
        max-interval: 5s
      on-client-errors: false
      exclude-on-http-codes:
        - 400
        - 413
        - 422

# M6.1 (ADR-12 §A12.1) — absorbed from rag-ingestion-api. The chunker +
# reembed property prefixes are preserved (`playground.rag-ingestion.*`) so
# existing env-var overrides (`PLAYGROUND_RAG_INGESTION_CHUNK_SIZE_TOKENS`,
# etc.) keep working without operator action. ADR-13 §1 / §7 (M3.1
# amendment) — see backing types ChunkingProperties / ReembedProperties.
#
# M6.1 (ADR-12 §A12.4..§A12.10) — async extraction + MinIO knobs follow.
playground:
  rag-ingestion:
    chunk:
      size-tokens: 800
      overlap-tokens: 120
      min-chunk-tokens: 64
      tokenizer: cl100k-base
      max-oversize-fence-tokens: 800
      preserve-heading-path: true
    reembed:
      scope: all
      user-id: null
      document-id: null
      inter-document-delay-millis: 0
  docs:
    minio:
      endpoint: ${PLAYGROUND_DOCS_MINIO_ENDPOINT:http://minio-playground:9000}
      access-key: ${MINIO_ROOT_USER:playground}
      secret-key: ${MINIO_ROOT_PASSWORD:playground-secret}
      bucket: ${PLAYGROUND_DOCS_MINIO_BUCKET:playground-docs-originals}
      region: ${PLAYGROUND_DOCS_MINIO_REGION:us-east-1}
    extraction:
      executor:
        parallelism: ${PLAYGROUND_DOCS_EXTRACTION_PARALLELISM:5}
        queue-capacity: ${PLAYGROUND_DOCS_EXTRACTION_QUEUE_CAPACITY:200}
      vision:
        per-page-timeout-seconds: ${PLAYGROUND_DOCS_VISION_PER_PAGE_TIMEOUT_SECONDS:60}
        retry:
          max-attempts: ${PLAYGROUND_DOCS_VISION_RETRY_MAX_ATTEMPTS:2}
          failure-threshold: ${PLAYGROUND_DOCS_VISION_FAILURE_THRESHOLD:0.2}
      pdf:
        max-pages: ${PLAYGROUND_DOCS_PDF_MAX_PAGES:100}

management:
  endpoints:
    web:
      exposure:
        # ADR-15 M5 — prometheus scrape from Alloy. health for the
        # docker-compose healthcheck.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui

# M2 S2 ADR-12 §5 + §8 — env-derived endpoints + owner sub. Read via @Value
# in the respective infra adapters; left here only as a single-line audit
# trail so a reader of application.yml sees all the externals at a glance.
# No Spring binding here — these are pure env vars consumed at @Value time.
#   OPENSEARCH_BASE_URL          (default http://opensearch-playground:9200)
#   IDENTITY_BASE_URL            (default http://identity-api:18081)
#   PLAYGROUND_OWNER_GOOGLE_SUB  (unset → fail-closed empty owner feed)
#   MINIO_ROOT_USER              (default playground)
#   MINIO_ROOT_PASSWORD          (default playground-secret)

logging:
  level:
    # com.playground.docs covers both the original docs BC packages and the
    # M6.1-absorbed ingestion subpackage (com.playground.docs.ingestion.*,
    # com.playground.docs.infrastructure.ingestion.*, etc.). Single root
    # logger keeps the M5 observability dashboards consistent.
    com.playground.docs: INFO
    org.springframework.modulith.events: INFO
