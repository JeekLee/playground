server:
  # ADR-13 §A — actuator-only; compose-internal port 18083 (no host mapping
  # per ADR-08 / ADR-13 §B). The port is still required for the actuator
  # endpoints; there are no controllers.
  port: 18083
  forward-headers-strategy: framework

spring:
  application:
    name: rag-ingestion-api
  datasource:
    # ADR-05: per-BC schema on a shared Postgres. The `currentSchema=rag`
    # JDBC URL parameter pins the default search_path so Hibernate's
    # default_schema setting + native SQL in the JDBC adapter agree.
    url: jdbc:postgresql://${POSTGRES_HOST:postgres-playground}:${POSTGRES_PORT:5432}/${POSTGRES_DB:playground}?currentSchema=rag
    username: ${POSTGRES_USER:playground}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: rag
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: rag
    default-schema: rag
    table: flyway_history
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    # ADR-13 §C — Redisson Spring Boot starter reads these to wire its
    # RedissonClient bean. The lock namespace `rag-ingestion:lock:*`
    # (ADR-08 Exception 2) is enforced inside RedissonDistributedLockAdapter.
    redis:
      host: ${REDIS_HOST:redis-playground}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-playground:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        linger.ms: 10
        compression.type: lz4
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # The DocumentEventListener overrides group-id per @KafkaListener. This
      # default exists so the auto-configured ConsumerFactory bean (used by
      # Spring Boot's auto-config) is not headless at startup.
      group-id: rag-ingestion
      auto-offset-reset: earliest
  modulith:
    # ADR-13 §D — Modulith outbox for rag.document.ingested. Schema-init
    # creates the event_publication table in the rag schema (Flyway also
    # creates it explicitly via V202605200002 for grep-ability + the
    # spring.jpa.hibernate.ddl-auto=validate constraint).
    events:
      jdbc:
        schema-initialization:
          enabled: true
      externalization:
        enabled: true
      kafka:
        enabled: true
  ai:
    openai:
      # ADR-04 + ADR-13 §10 — spark-inference-gateway at
      # host.docker.internal:10080 exposes OpenAI-compatible /v1/embeddings.
      base-url: ${SPRING_AI_OPENAI_BASE_URL:http://host.docker.internal:10080}
      api-key: ${SPRING_AI_OPENAI_API_KEY:dummy-not-used}
      # Disable the OpenAI ChatModel auto-config — M3 only embeds. Without
      # this Spring AI tries to call /v1/chat/completions and fails health
      # if no chat model is reachable.
      chat:
        enabled: false
      embedding:
        options:
          # The gateway's served model name; override at deploy if the
          # vLLM launch script used a different id (per ADR-04 + ADR-13 §10).
          model: ${SPRING_AI_EMBEDDING_MODEL:bge-m3}
    retry:
      # ADR-13 §2 — embedding retry curve. Spring AI's built-in retry advisor
      # uses these to wrap RestClient calls to the OpenAI-compatible endpoint.
      max-attempts: 3
      backoff:
        initial-interval: 400ms
        multiplier: 4.0
        max-interval: 5s
      on-client-errors: false
      exclude-on-http-codes:
        - 400
        - 413
        - 422

# ADR-13 §1 — chunker defaults; overridable via PLAYGROUND_RAG_INGESTION_CHUNK_*.
playground:
  rag-ingestion:
    chunk:
      size-tokens: 800
      overlap-tokens: 120
      min-chunk-tokens: 64
      tokenizer: cl100k-base

management:
  endpoints:
    web:
      exposure:
        # ADR-13 §6 — prometheus scrape from M5 dashboards. health for
        # docker-compose healthcheck.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: rag-ingestion

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui

logging:
  level:
    com.playground.ragingestion: INFO
    org.springframework.modulith.events: INFO
