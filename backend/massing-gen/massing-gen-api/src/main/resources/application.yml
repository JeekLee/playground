server:
  # ADR-18 §2 — port 18083 (reclaimed from retired rag-ingestion-api per
  # ADR-01 §A01.7). Compose-internal only; gateway forwards /api/arch/**
  # but never /internal/** (Exception 4 invariant per ADR-08 §A08.8).
  port: ${SERVER_PORT:18083}
  forward-headers-strategy: framework

spring:
  application:
    name: massing-gen-api
  datasource:
    # ADR-18 §18 — massing-gen-api owns the `arch` schema. Hikari init SQL
    # sets search_path to arch (M8 has no cross-schema SELECTs; body fetch
    # goes over HTTP per ADR-08 §A08.12 Exception 5).
    url: jdbc:postgresql://${POSTGRES_HOST:postgres-playground}:${POSTGRES_PORT:5432}/${POSTGRES_DB:playground}?currentSchema=arch
    username: ${POSTGRES_USER:playground}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      pool-name: massing-gen-pool
      connection-init-sql: "SET search_path TO arch, public"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: arch
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: arch
    default-schema: arch
    table: flyway_arch
    locations: classpath:db/migration
    baseline-on-migrate: true
  ai:
    # ADR-18 §4 — Spring AI 1.0.0 GA ChatClient backed by spark-inference-gateway.
    # Same starter rag-chat (M4) and docs (M6 Vision) use; only the M8-specific
    # knobs (model name, temperature, max-tokens) live here.
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:http://host.docker.internal:10080}
      api-key: ${SPRING_AI_OPENAI_API_KEY:dummy-not-used}
      chat:
        options:
          # ADR-18 §4 — defaults to Qwen3-32B (project standard via ADR-04).
          # Operator may override to a code-tuned model if one becomes
          # available without a massing-gen rebuild.
          model: ${PLAYGROUND_MASSING_LLM_MODEL:Qwen3-32B}
          # Low temperature — programJson extraction must be deterministic.
          temperature: 0.1
          # 30-room program ≈ ~2 KiB ≈ 800 tokens; 3000 gives ~3.5× headroom.
          max-tokens: 3000
    retry:
      # Mirror the ADR-13 §2 retry curve used by rag-chat / docs.
      max-attempts: 3
      backoff:
        initial-interval: 400ms
        multiplier: 4.0
        max-interval: 5s
      on-client-errors: false
      exclude-on-http-codes:
        - 400
        - 413
        - 422

# ADR-18 §19 — BC-specific properties (algorithm cap, sidecar URL/timeout,
# docs-api URL/timeout). All env-overridable.
playground:
  massing:
    # ADR-18 §8 — over-area policy. ceil(totalArea / siteArea) > maxFloors
    # triggers MASSING_ALGORITHM_FAILED. 10 covers >99% of plausible competition
    # briefs (high-rise programs are outside M8 P0 scope).
    max-floors: ${PLAYGROUND_MASSING_MAX_FLOORS:10}
    # ADR-18 §8 — fallback site/floor-height defaults when the brief extraction
    # produces no value AND the request omits the optional fields.
    default-site-width-m: ${PLAYGROUND_MASSING_DEFAULT_SITE_WIDTH_M:20.0}
    default-site-depth-m: ${PLAYGROUND_MASSING_DEFAULT_SITE_DEPTH_M:10.0}
    default-floor-height-m: ${PLAYGROUND_MASSING_DEFAULT_FLOOR_HEIGHT_M:3.5}
    rhino3dm-bridge:
      # ADR-18 §11 — Node 18-alpine + rhino3dm@8.4.0 sidecar. Compose-internal
      # on port 4000. Per-call timeout (working 30s) tighter than the descriptor
      # timeout (60s) so the BC fails fast on a hanging sidecar.
      url: ${PLAYGROUND_RHINO3DM_BRIDGE_URL:http://rhino3dm-bridge:4000}
      timeout-ms: ${PLAYGROUND_RHINO3DM_BRIDGE_TIMEOUT_MS:30000}
    docs-api:
      # ADR-18 §3 / ADR-08 §A08.12 Exception 5 — HTTP-only access to the docs
      # body via the defensively-preserved /internal/docs/{id}/body route.
      # Fresh, identity-forwarding exception (not a revival of retired
      # Exception 1).
      url: ${PLAYGROUND_DOCS_API_URL:http://docs-api:18082}
      body-fetch-timeout-ms: ${PLAYGROUND_DOCS_BODY_FETCH_TIMEOUT_MS:5000}

# ADR-18 §17 — Resilience4j breaker config. Two instances:
#   * rhino3dm-bridge — wraps the sidecar HTTP call (new).
#   * spark-gateway   — shared with M4/M6 LLM call paths; reused for the
#                       BriefProgramExtractor LLM call per ADR-18 §4.
# Thresholds mirror ADR-14 §4 verbatim — 50% / 60s window / 10 min calls /
# 30s OPEN / 1 half-open probe.
resilience4j:
  circuitbreaker:
    instances:
      rhino3dm-bridge:
        failure-rate-threshold: 50
        sliding-window-size: 60
        sliding-window-type: TIME_BASED
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      spark-gateway:
        failure-rate-threshold: 50
        sliding-window-size: 60
        sliding-window-type: TIME_BASED
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        # ADR-15 M5 — prometheus scrape from Alloy. health for the
        # docker-compose healthcheck.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: massing-gen

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui

logging:
  level:
    com.playground.massinggen: INFO
